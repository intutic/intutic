[package]
name = "intutic-proxy"
version = "1.5.0"
edition = "2021"
authors = ["Intutic <eng@intutic.dev>"]
description = "High-performance AI agent proxy with WebAssembly-based governance policies"
license = "MIT"

[lib]
name = "intutic_proxy"
path = "src/lib.rs"

[[bin]]
name = "intutic-proxy"
path = "src/main.rs"

[dependencies]
# Web framework
axum = { version = "0.7", features = ["ws", "macros", "http2"] }
tokio = { version = "1", features = ["full"] }
tower = "0.4"
tower-http = { version = "0.5", features = ["cors", "trace"] }
hyper = { version = "1", features = ["full"] }
hyper-util = { version = "0.1", features = ["full"] }

# HTTP client for upstream LLM providers
reqwest = { version = "0.12", features = ["stream", "json", "rustls-tls"], default-features = false }

# WASM runtime
wasmtime = "29"
wasmtime-wasi = "29"


# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Redis/Valkey client
redis = { version = "0.25", features = ["aio", "tokio-comp", "connection-manager"] }

# Regex for DLP scanner
regex = "1"

# Code skeleton extraction — Rust AST (snip_code.rs)
syn = { version = "2.0", features = ["parsing", "full"] }

# Code skeleton extraction — multi-language via tree-sitter WASM grammars
# Grammars are embedded via include_bytes! at compile time (see assets/grammars/)
# wasmtime is already a dependency; tree-sitter just enables its wasm feature
tree-sitter = { version = "0.24", features = ["wasm"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
opentelemetry = { version = "0.24", features = ["trace"] }
opentelemetry_sdk = { version = "0.24", features = ["rt-tokio", "trace"] }
opentelemetry-otlp = { version = "0.17", features = ["tonic", "tokio", "trace"] }
tracing-opentelemetry = "0.25"

# Misc
uuid = { version = "1", features = ["v4"] }
nanoid = "0.4"
base64 = "0.22"
sha2 = "0.10"
hex = "0.4"
anyhow = "1"
once_cell = "1"
thiserror = "1"
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"
rand_distr = "0.4"
tokio-stream = "0.1"
futures-util = "0.3"

# Phase 7: Token Intelligence (LLD #47)
tiktoken-rs = "0.6"
# TLS MITM for Windsurf Cascade AI governance
rcgen = { version = "0.13", features = ["pem"] }
rustls = { version = "0.23", features = ["ring"] }
tokio-rustls = "0.26"
rustls-pemfile = "2"

[dev-dependencies]
tokio-test = "0.4"
wiremock = "0.6"
criterion = { version = "0.5", features = ["html_reports", "async_tokio"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }

[[bench]]
name = "snip_bench"
harness = false

[[bench]]
name = "policy_bench"
harness = false

[[bench]]
name = "policy_e2e_bench"
harness = false

[[bench]]
name = "wasm_bench"
harness = false
