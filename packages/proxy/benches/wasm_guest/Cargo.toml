[package]
name = "bench-wasm-guest"
version = "0.1.0"
edition = "2021"
description = "Minimal WASM guest for proxy plugin benchmarks"

[lib]
crate-type = ["cdylib"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[profile.release]
opt-level = "s"
lto = true
strip = true
